name: Keepalive

on:
  schedule:
    - cron: '0 12 1 * *'  # Runs on the 1st of every month at noon UTC

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Keep repository active
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "Last keepalive: $(date)" > keepalive.txt
          git add keepalive.txt
          git commit -m "Keepalive - $(date +'%B %Y')"
          git push
